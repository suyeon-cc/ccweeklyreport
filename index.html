<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>첫차 UA Weekly Report</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --mint:#465fff;--pink:#ff46c4;--blue:#00ABFF;--coral:#ff4668;
  --topLine:#e84545;--lowLine:#ff8c42;
  --ok:#00ABFF;--warn-g:#8AF293;--bad:#ff4668;
  --bg:#f5f5f0;--surface:#ffffff;--card:#ffffff;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);
  --t1:#0f172a;--t2:#334155;--t3:#64748b;
  --font:'Pretendard',-apple-system,sans-serif;
  --r:12px;--rs:7px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100vh;display:flex;font-size:13px;line-height:1.5}

/* ── SIDEBAR ── */
.sb{width:220px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0 20px;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.sb-logo{display:flex;align-items:center;gap:10px;padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sb-mark{width:32px;height:32px;background:#0f172a;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;letter-spacing:-.5px}
.sb-brand{font-size:13px;font-weight:700;color:var(--t1)}
.sb-weekbadge{display:inline-flex;align-items:center;background:rgba(70,95,255,.08);color:#465fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;margin-top:3px;letter-spacing:.03em}
.sb-sect{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;padding:0 20px;margin:12px 0 4px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 20px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;border-left:2px solid transparent;transition:all .12s;user-select:none}
.sb-item:hover{color:var(--t1);background:rgba(0,0,0,.04)}
.sb-item.active{color:#0f172a;background:rgba(0,0,0,.05);border-left-color:#0f172a;font-weight:600}
.sb-foot{margin-top:auto;padding:14px 20px 0;border-top:1px solid var(--border)}
.sb-foot-l{font-size:9px;color:var(--t3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.08em}
.sb-foot-v{font-size:11px;color:var(--t2)}

/* ── WEEK SELECTOR ── */
.wk-wrap{padding:10px 16px 14px;border-bottom:1px solid var(--border);margin-bottom:4px}
.wk-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
.wk-custom{position:relative;width:100%}
.wk-trigger{display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:500;color:var(--t1);transition:all .15s;user-select:none}
.wk-trigger:hover{border-color:#465fff;background:#fff}
.wk-trigger.open{border-color:#465fff;background:#fff;box-shadow:0 0 0 3px rgba(70,95,255,.1)}
.wk-trigger-txt{display:flex;flex-direction:column;gap:1px}
.wk-trigger-main{font-size:11px;font-weight:600;color:var(--t1)}
.wk-trigger-sub{font-size:9px;color:var(--t3)}
.wk-arrow{width:14px;height:14px;display:flex;align-items:center;justify-content:center;color:var(--t3);flex-shrink:0;transition:transform .15s}
.wk-arrow.open{transform:rotate(180deg)}
.wk-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--border2);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:200;max-height:240px;overflow-y:auto;display:none}
.wk-dropdown.open{display:block}
.wk-option{padding:8px 12px;cursor:pointer;transition:background .1s;display:flex;flex-direction:column;gap:1px}
.wk-option:first-child{border-radius:9px 9px 0 0}
.wk-option:last-child{border-radius:0 0 9px 9px}
.wk-option:hover{background:rgba(70,95,255,.06)}
.wk-option.selected{background:rgba(70,95,255,.08)}
.wk-option-main{font-size:11px;font-weight:600;color:var(--t1)}
.wk-option-sub{font-size:9px;color:var(--t3)}
.wk-option.selected .wk-option-main{color:#465fff}

/* ── MAIN ── */
.main{flex:1;padding:28px 32px 48px;min-width:0;overflow-x:hidden}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.ph-left{display:flex;flex-direction:column;gap:3px}
.ph-eyebrow{font-size:10px;font-weight:600;color:#0f172a;text-transform:uppercase;letter-spacing:.12em}
.ph-title{font-size:18px;font-weight:700;color:var(--t1);letter-spacing:-.3px}
.ph-sub{font-size:11px;color:var(--t3)}
.ph-badge{background:var(--card);border:1px solid var(--border2);padding:6px 13px;border-radius:var(--rs);font-size:11px;font-weight:500;color:var(--t2)}

/* ── SECTION ── */
.sec{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;display:flex;align-items:center;gap:8px;margin:20px 0 12px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.sec-accent{color:#0f172a}
.sec-sub{font-size:9px;color:var(--t3);font-weight:400;text-transform:none;letter-spacing:0}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px}
.mb12{margin-bottom:12px}

/* ── CARD ── */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:16px 18px}
.ct{font-size:11px;font-weight:700;color:var(--t1);margin-bottom:1px}
.cs{font-size:10px;color:var(--t3);margin-bottom:12px}

/* ── WoW ── */
.wow-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:14px 16px}
.wow-lbl{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.wow-val{font-size:20px;font-weight:800;color:var(--t1);letter-spacing:-.6px;line-height:1;margin-bottom:9px}
.wow-deltas{display:flex;flex-direction:column;gap:4px}
.wow-dr{display:flex;justify-content:space-between;align-items:center}
.wow-dl{font-size:9px;color:var(--t3)}
.wow-dv{font-size:10px;font-weight:700;color:#0f172a}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{font-size:9px;font-weight:600;color:var(--t3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border2);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.tbl th.r{text-align:right}
.tbl td{padding:8px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(0,0,0,.03)}
.td-r{text-align:right;color:var(--t2)}
.td-ok{color:#00ABFF;text-align:right}
.td-bd{color:#ff4668;text-align:right}
.td-wn{color:#d97706;text-align:right}
.cnm{font-weight:600;color:var(--t1)}
.tag{font-size:9px;font-weight:600;padding:1px 6px;border-radius:20px;margin-left:4px;vertical-align:middle}
.tag-new{background:rgba(0,171,255,.15);color:#00ABFF}

/* ── BADGE ── */
.ob{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.ob-ok{background:rgba(0,171,255,.1);color:#00ABFF}
.ob-wn{background:rgba(217,119,6,.12);color:#d97706}
.ob-bd{background:rgba(255,70,104,.1);color:#ff4668}

/* ── ROLE GRID ── */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:16px;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden}
.role-side{padding:12px 16px}
.role-side.inst{background:rgba(70,95,255,.07);border-right:1px solid var(--border2)}
.role-side.cpa{background:rgba(255,70,196,.07)}
.role-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.role-side.inst .role-lbl{color:#465fff}
.role-side.cpa .role-lbl{color:#ff46c4}
.role-name{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:2px}
.role-desc{font-size:10px;color:var(--t3)}
.role-kpi{font-size:10px;font-weight:600;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.role-side.inst .role-kpi{color:#465fff}
.role-side.cpa .role-kpi{color:#ff46c4}

/* ── 4-CHART ── */
.chart4-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.chart4-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:14px 14px 10px}
.c4-label{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.c4-current{font-size:18px;font-weight:800;color:var(--t1);letter-spacing:-.5px;line-height:1.1;margin-bottom:3px}
.c4-delta{font-size:9px;font-weight:600;margin-bottom:10px;color:#0f172a}

/* ── TOP/LOW ── */
.toplow-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.toplow-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:14px 14px 10px}
.tl-legend{display:flex;gap:12px;margin-top:6px}
.tl-leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--t3)}
.tl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── INSIGHT ── */
.insight-panel{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.ip-hd{padding:10px 16px;background:linear-gradient(90deg,rgba(70,95,255,.08),rgba(255,70,196,.06));font-size:11px;font-weight:700;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.ip-row{display:grid;grid-template-columns:160px 1fr auto;gap:12px;align-items:start;padding:11px 16px;border-bottom:1px solid var(--border)}
.ip-row:last-child{border-bottom:none}
.ip-row:hover{background:rgba(0,0,0,.02)}
.ip-lbl{font-size:11px;font-weight:700;color:var(--t1)}
.ip-sub{font-size:9px;color:var(--t3);margin-top:1px}
.ip-metrics{display:flex;gap:8px;flex-wrap:wrap}
.ip-m{font-size:10px;color:var(--t3)}
.ip-m strong{color:var(--t2);font-weight:600}
.ip-desc{font-size:10px;color:var(--t3);margin-top:5px;line-height:1.55}
.ip-desc span{display:block;padding:1px 0}
.ip-desc span::before{content:"• ";color:var(--t3)}
.action-btn{display:inline-block;font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap}
.a-up{background:rgba(70,95,255,.1);color:#465fff}
.a-cut{background:rgba(255,70,104,.1);color:#ff4668}

/* ── HIER TABLE ── */
.hier-tbl{width:100%;border-collapse:collapse;font-size:11px}
.hier-tbl th{font-size:9px;font-weight:600;color:var(--t3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border2);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.hier-tbl th.r{text-align:right}
.hier-tbl tr.cr td{padding:8px;background:rgba(0,0,0,.03);font-weight:700;font-size:11px;border-bottom:1px solid var(--border);cursor:pointer}
.hier-tbl tr.ar td{padding:7px 8px 7px 22px;font-weight:600;font-size:10px;color:var(--t2);border-bottom:1px solid var(--border);cursor:pointer}
.hier-tbl tr.dr td{padding:6px 8px 6px 38px;font-size:10px;color:var(--t3);border-bottom:1px solid rgba(0,0,0,.04)}
.hier-tbl tr:hover td{background:rgba(0,0,0,.04)}
.hier-tbl td.r{text-align:right}
.ex{display:inline-block;width:10px;margin-right:5px;transition:transform .15s;font-size:8px;color:var(--t3)}
.expanded .ex{transform:rotate(90deg)}
.fk{background:rgba(0,171,255,.1);color:#00ABFF;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:700}
.fw{background:rgba(138,242,147,.2);color:#3a9e40;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:700}
.fr{background:rgba(255,70,104,.1);color:#ff4668;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:700}

/* ── LOADER ── */
.loading-bar{display:flex;align-items:center;gap:10px;padding:16px;font-size:11px;color:var(--t3)}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:#465fff;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOOLTIP ── */
.chart-tooltip{position:fixed;background:#ffffff;color:#0f172a;font-size:10px;font-family:var(--font);font-weight:500;padding:5px 9px;border-radius:6px;pointer-events:none;z-index:9999;display:none;white-space:nowrap;box-shadow:0 2px 10px rgba(0,0,0,.12);border:1px solid #e2e8f0}
.divider{height:1px;background:var(--border);margin:16px 0}
.view-panel{display:none}
.view-panel.active{display:block}
.no-data-msg{padding:32px;text-align:center;color:var(--t3);font-size:12px}
/* ── OPT BOX ── */
.opt-box{background:rgba(0,0,0,.03);border-radius:var(--rs);border:1px solid var(--border);padding:10px 12px;margin-bottom:7px}
.opt-bh{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.opt-type{font-size:9px;color:var(--t3)}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.opt-inner{background:rgba(0,0,0,.03);border-radius:6px;padding:8px 10px}
.opt-inner-hd{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.opt-inner-body{font-size:10px;color:var(--t2);display:flex;flex-direction:column;gap:3px}
.opt-result{font-size:10px;color:var(--t2);border-radius:5px;padding:7px 10px}
.opt-result.ok{background:rgba(0,171,255,.06)}
.opt-result.warn{background:rgba(255,70,104,.06)}

</style>
</head>

<!-- GOOGLE -->

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let DAILY = {};   // {gt:{}, gi:{}, fbi:{}, fbc:{}, top:{}, low:{}}  date->row
let WEEKS = [];   // [{key, label, isoWeek, week_start, week_end, gt, gi, fbi, fbc_daily, toplow_daily}]
let curIdx = 0;
let isDropdownOpen = false;
let dataLoaded = false;

/* ══════════════════════════════════════════
   DATE UTILS
══════════════════════════════════════════ */
function isoWeekNumber(dateStr) {
  const d = new Date(dateStr);
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const startOfWeek1 = new Date(jan4);
  startOfWeek1.setDate(jan4.getDate() - (jan4.getDay() || 7) + 1);
  const diff = d - startOfWeek1;
  if (diff < 0) {
    // 연초 전 주는 전년도 마지막 주
    const jan4Prev = new Date(d.getFullYear() - 1, 0, 4);
    const startPrev = new Date(jan4Prev);
    startPrev.setDate(jan4Prev.getDate() - (jan4Prev.getDay() || 7) + 1);
    return Math.floor((d - startPrev) / 604800000) + 1;
  }
  return Math.floor(diff / 604800000) + 1;
}

function weekStart(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const mon = new Date(d);
  mon.setDate(d.getDate() + diff);
  return mon.toISOString().slice(0,10);
}

function weekEnd(dateStr) {
  const ws = weekStart(dateStr);
  const d = new Date(ws);
  d.setDate(d.getDate() + 6);
  return d.toISOString().slice(0,10);
}

function fmtMMDD(dateStr) {
  return dateStr.slice(5).replace('-','/');
}

/* ══════════════════════════════════════════
   CSV FETCH & PARSE
══════════════════════════════════════════ */
function fetchAllData() {
  return new Promise(function(resolve, reject) {
    var cbName = 'ua_cb_' + Date.now();
    var script = document.createElement('script');
    var timer = setTimeout(function() {
      delete window[cbName];
      document.body.removeChild(script);
      reject(new Error('요청 시간 초과 (30초)'));
    }, 120000);

    window[cbName] = function(data) {
      clearTimeout(timer);
      delete window[cbName];
      document.body.removeChild(script);
      if (data.error) { reject(new Error(data.error)); return; }
      resolve(data);
    };

    script.src = APPS_SCRIPT_URL + '?callback=' + cbName;
    script.onerror = function() {
      clearTimeout(timer);
      delete window[cbName];
      document.body.removeChild(script);
      reject(new Error('Script 로드 실패 — Apps Script 배포 설정을 확인해주세요'));
    };
    document.body.appendChild(script);
  });
}

// Apps Script 배열 형식 [cost, imps, clicks, install, contact] → 객체로 변환
function convertRow(arr) {
  if (!arr || arr.length < 5) return null;
  const [cost, imps, clicks, install, contact, ctrRaw, cpmRaw] = arr;
  // Apps Script 컬럼: COL_CTR=8(소수값 예:0.0081), COL_INSTALL=13(Install[new]), COL_CONTACT=18
  // ctrRaw: % 단위로 전달됨 (예: 0.81) → 소수점 1자리로 표기
  const ctr = (ctrRaw != null && ctrRaw > 0) ? parseFloat(Number(ctrRaw).toFixed(2)) : null;
  // cpm: Apps Script에서 직접 계산 전달, 없으면 imps로 계산
  const cpm = (cpmRaw != null && cpmRaw > 0) ? Math.round(cpmRaw) :
              (imps > 0 ? Math.round(cost / imps * 1000) : null);
  return {
    cost, imps, clicks, install, contact,
    cpm,
    ctr,
    cpi: install > 0 ? Math.round(cost / install) : null,
    cpa: contact > 0 ? Math.round(cost / contact) : null,
  };
}

function convertSheet(raw) {
  const result = {};
  for (const [date, arr] of Object.entries(raw)) {
    const row = convertRow(arr);
    if (row) result[date] = row;
  }
  return result;
}

/* ══════════════════════════════════════════
   AGGREGATE WEEKS
══════════════════════════════════════════ */
function aggregateWeekly(daily) {
  const weeks = {};
  Object.entries(daily).sort().forEach(([d, v]) => {
    const ws = weekStart(d);
    if (!weeks[ws]) weeks[ws] = {cost:0,imps:0,clicks:0,install:0,contact:0};
    weeks[ws].cost    += v.cost;
    weeks[ws].imps    += v.imps;
    weeks[ws].clicks  += v.clicks;
    weeks[ws].install += v.install;
    weeks[ws].contact += v.contact;
  });
  const result = {};
  Object.entries(weeks).sort().forEach(([ws, w]) => {
    result[ws] = {
      cost: Math.round(w.cost), install: Math.round(w.install), contact: Math.round(w.contact),
      cpm:  w.imps   > 0 ? Math.round(w.cost / w.imps * 1000) : null,
      ctr:  w.imps   > 0 ? parseFloat((w.clicks / w.imps * 100).toFixed(2)) : null,
      cpi:  w.install> 0 ? Math.round(w.cost / w.install) : null,
      cpa:  w.contact> 0 ? Math.round(w.cost / w.contact) : null,
    };
  });
  return result;
}

function buildWeekList(gt_w, gi_w, fbi_w, fbc_w) {
  const allKeys = new Set([...Object.keys(gt_w),...Object.keys(gi_w),...Object.keys(fbi_w),...Object.keys(fbc_w)]);
  return [...allKeys].sort().map(ws => {
    const we = weekEnd(ws);
    const iso = isoWeekNumber(ws);
    const mmStart = fmtMMDD(ws);
    const mmEnd   = fmtMMDD(we);
    return {
      key: ws,
      label: `${iso}주차 (${mmStart}~${mmEnd})`,
      isoWeek: iso,
      week_start: ws,
      week_end: we,
      gt:  gt_w[ws]  || null,
      gi:  gi_w[ws]  || null,
      fbi: fbi_w[ws] || null,
      fbc: fbc_w[ws] || null,
    };
  });
}

/* ══════════════════════════════════════════
   CHART ENGINE
══════════════════════════════════════════ */
function sparkLine(data, color, labels, unit, W, H, pL, pT, pB) {
  W=W||240; H=H||60; pL=pL||0; pT=pT||4; pB=pB||18;
  const vals = data.filter(v => v != null);
  if (!vals.length) return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px"><text x="${W/2}" y="${H/2}" text-anchor="middle" font-size="9" fill="#94a3b8">데이터 없음</text></svg>`;
  const rawMin = Math.min(...vals), rawMax = Math.max(...vals);
  const pad = (rawMax - rawMin) * 0.5 || rawMax * 0.08;
  const minV = rawMin - pad, maxV = rawMax + pad;
  const n = data.length;
  const xS = n > 1 ? (W-pL)/(n-1) : W/2;
  const sY = v => pT + (H-pT-pB)*(1-(v-minV)/(maxV-minV));
  const pts = data.map((v,i) => v!=null ? [pL+i*xS, sY(v)] : null);
  let pathD='', areaD='', first=true, lastX=0, lastY=0;
  pts.forEach((p) => {
    if(!p) return;
    if(first){pathD=`M${p[0]},${p[1]}`;areaD=`M${p[0]},${H-pB} L${p[0]},${p[1]}`;first=false;}
    else{pathD+=` L${p[0]},${p[1]}`;areaD+=` L${p[0]},${p[1]}`;}
    lastX=p[0]; lastY=p[1];
  });
  areaD += ` L${lastX},${H-pB} Z`;
  const labelIdx = n>2 ? [0, Math.floor(n/2), n-1] : [0, n-1];
  const xlbls = labelIdx.map(i => {
    const lbl = labels?.[i]?.replace('W','') ?? '';
    return `<text x="${pL+i*xS}" y="${H}" text-anchor="middle" font-size="8" fill="#7a8fa6">${lbl}</text>`;
  }).join('');
  const lastPt = pts.filter(Boolean).pop();
  const dot = lastPt ? `<circle cx="${lastPt[0]}" cy="${lastPt[1]}" r="3" fill="${color}"/>` : '';
  const uid = Math.random().toString(36).slice(2);
  let hoverPts = '';
  data.forEach((v, i) => {
    const x = pL+i*xS;
    if (v == null) {
      hoverPts += `<circle cx="${x}" cy="${H-pB-2}" r="3" fill="#c0c8d8" opacity="0.8" class="hover-pt" data-val="데이터 없음" data-lbl="${labels?.[i]??''}" data-delta="—"/>`;
      return;
    }
    const p = pts[i]; if(!p) return;
    const prevV = data.slice(0,i).filter(x=>x!=null).pop();
    const deltaStr = prevV != null ? ((v/prevV-1)*100).toFixed(1) : '—';
    const sign = prevV!=null&&v>prevV ? '+' : '';
    const dispVal = unit==='%' ? v.toFixed(2)+'%' : v>=10000 ? (v/10000).toFixed(1)+'만원' : v.toLocaleString('ko')+(unit==='원'?'원':'');
    hoverPts += `<circle cx="${p[0]}" cy="${p[1]}" r="7" fill="transparent" class="hover-pt" style="cursor:pointer" data-val="${dispVal}" data-lbl="${labels?.[i]??''}" data-delta="${deltaStr!=='—'?sign+deltaStr+'%':'—'}"/>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible">
    <defs><linearGradient id="g${uid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity=".18"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${areaD}" fill="url(#g${uid})"/>
    <path d="${pathD}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    ${dot}${hoverPts}${xlbls}
  </svg>`;
}

function fmtV(v, unit) {
  if (v==null) return '—';
  if (unit==='%') return v.toFixed(2)+'%';
  if (v>=10000) return (v/10000).toFixed(1)+'만'+unit;
  return Math.round(v).toLocaleString('ko')+unit;
}
function fmtDelta(curr, prev) {
  if (!curr||!prev) return '';
  const d=(curr/prev-1)*100;
  return `<span style="color:#0f172a;font-size:9px">${d>0?'🔺':'🔻'}${Math.abs(d).toFixed(1)}%</span>`;
}
function N(v,u='') { return v==null?'—':Math.round(v).toLocaleString('ko')+u; }

function makeDailyCharts(containerID, dailyArr, color) {
  const el = document.getElementById(containerID); if(!el) return;
  if (!dailyArr || !dailyArr.length) { el.innerHTML='<div class="no-data-msg">이 주차의 일별 데이터가 없습니다</div>'; return; }
  const labels = dailyArr.map(d => d.label);
  // 14일 초과 시 x축 레이블 간격 조정 (첫날, 7일마다, 마지막)
  function pickLabels(arr, n) {
    if (n <= 14) return arr;
    return arr.map((l,i) => (i===0 || i===n-1 || i%7===0) ? l : '');
  }
  const dispLabels = pickLabels(labels, labels.length);
  const keys = ['cpm','ctr','cpi','cpa'];
  const units = ['원','%','원','원'];
  const mLabels = ['CPM','CTR','CPI','CPA'];
  let html = '';
  keys.forEach((key,ki) => {
    const data = dailyArr.map(d => d[key]);
    const valid = data.filter(v=>v!=null);
    // 현재값: CPI/CPA는 주간 합산 기준, CPM/CTR은 마지막 7일 평균
    const thisSlice7 = dailyArr.slice(-7);
    let curr;
    if (key === 'cpi') {
      const tCost = thisSlice7.reduce((a,d)=>a+(d.cost||0),0);
      const tInst = thisSlice7.reduce((a,d)=>a+(d.install||0),0);
      curr = tInst > 0 ? Math.round(tCost/tInst) : valid[valid.length-1];
    } else if (key === 'cpa') {
      const tCost = thisSlice7.reduce((a,d)=>a+(d.cost||0),0);
      const tCont = thisSlice7.reduce((a,d)=>a+(d.contact||0),0);
      curr = tCont > 0 ? Math.round(tCost/tCont) : valid[valid.length-1];
    } else {
      const thisWeekVals = thisSlice7.map(d => d[key]).filter(v=>v!=null);
      curr = thisWeekVals.length > 0
        ? thisWeekVals.reduce((a,b)=>a+b,0)/thisWeekVals.length
        : valid[valid.length-1];
    }
    // WoW: 이번주 7일 vs 전주 7일 주간 합산 기준 계산
    let wowDelta = '';
    const n_total = dailyArr.length;
    if (n_total >= 8) {
      const thisSlice = dailyArr.slice(-7);
      const prevSlice = dailyArr.slice(-14, -7);
      if (prevSlice.length >= 1) {
        let wowVal = null;
        if (key === 'cpi') {
          // CPI = 이번주 총 cost / 이번주 총 install
          const tCost = thisSlice.reduce((a,d)=>a+(d.cost||0),0);
          const tInst = thisSlice.reduce((a,d)=>a+(d.install||0),0);
          const pCost = prevSlice.reduce((a,d)=>a+(d.cost||0),0);
          const pInst = prevSlice.reduce((a,d)=>a+(d.install||0),0);
          if (tInst>0 && pInst>0) wowVal = (tCost/tInst)/(pCost/pInst)-1;
        } else if (key === 'cpa') {
          // CPA = 이번주 총 cost / 이번주 총 contact
          const tCost = thisSlice.reduce((a,d)=>a+(d.cost||0),0);
          const tCont = thisSlice.reduce((a,d)=>a+(d.contact||0),0);
          const pCost = prevSlice.reduce((a,d)=>a+(d.cost||0),0);
          const pCont = prevSlice.reduce((a,d)=>a+(d.contact||0),0);
          if (tCont>0 && pCont>0) wowVal = (tCost/tCont)/(pCost/pCont)-1;
        } else {
          // CPM, CTR: 일별 유효값 평균
          const tv = thisSlice.map(d=>d[key]).filter(v=>v!=null);
          const pv = prevSlice.map(d=>d[key]).filter(v=>v!=null);
          if (tv.length>0 && pv.length>0) {
            wowVal = (tv.reduce((a,b)=>a+b,0)/tv.length)/(pv.reduce((a,b)=>a+b,0)/pv.length)-1;
          }
        }
        if (wowVal != null) {
          const d = wowVal*100;
          wowDelta = `<span style="color:#0f172a;font-size:9px">${d>0?'🔺':'🔻'}${d>0?'+':''}${d.toFixed(1)}%</span> <span style="color:var(--t3);font-size:9px">WoW</span>`;
        }
      }
    }
    html += `<div class="chart4-card">
      <div class="c4-label">${mLabels[ki]}</div>
      <div class="c4-current">${fmtV(curr,units[ki])}</div>
      <div class="c4-delta">${wowDelta}</div>
      ${sparkLine(data, color, dispLabels, units[ki])}
    </div>`;
  });
  el.innerHTML = html;
}

        const dispVal=m.unit==='%'?v.toFixed(2)+'%':v>=10000?(v/10000).toFixed(1)+'만원':v.toLocaleString('ko')+m.unit;
        hover+=`<circle cx="${p[0]}" cy="${p[1]}" r="7" fill="transparent" class="hover-pt" style="cursor:pointer" data-val="${dispVal}" data-lbl="${days[i]}" data-delta="${dStr!=='—'?sign+dStr+'%':'—'}"/>`;
      });
      return `<path d="${d}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>${dot}${hover}`;
    }
    // x축: 7일 단위 레이블
    const xLabels = days.map((d,i)=>{
      const show = (i===0 || i===n-1 || i%7===0);
      const anchor = i===0?'start':(i===n-1?'end':'middle');
      return `<text x="${pL+i*xS}" y="${H}" text-anchor="${anchor}" font-size="8" fill="#94a3b8">${show?d:''}</text>`;
    }).join('');
    // WoW: 마지막 7일 평균 vs 그 이전 7일 평균
    function wowAvg(data, metricKey) {
      const n_total = dailyArr.length;
      if (n_total < 8) return null;
      const thisSlice = dailyArr.slice(-7);
      const prevSlice = dailyArr.slice(-14,-7);
      if (prevSlice.length < 1) return null;
      let wowVal = null;
      if (metricKey === 'cpi' || metricKey === 'cpa') {
        // TOP/LOW 각각의 cost/install/contact를 data 인덱스로 역추적
        // topD[i] = dailyArr[i].top?.cpi → cost/install은 별도 접근 필요
        // 대신 cpi/cpa 값 자체를 평균으로 WoW 계산 (유효값만)
        const tv = thisSlice.map((_,i)=>data[n_total-7+i]).filter(v=>v!=null);
        const pv = prevSlice.map((_,i)=>data[n_total-14+i]).filter(v=>v!=null);
        if (tv.length>0 && pv.length>0) {
          wowVal = ((tv.reduce((a,b)=>a+b,0)/tv.length)/(pv.reduce((a,b)=>a+b,0)/pv.length)-1)*100;
        }
      } else {
        const tv = thisSlice.map((_,i)=>data[n_total-7+i]).filter(v=>v!=null);
        const pv = prevSlice.map((_,i)=>data[n_total-14+i]).filter(v=>v!=null);
        if (tv.length>0 && pv.length>0) {
          wowVal = ((tv.reduce((a,b)=>a+b,0)/tv.length)/(pv.reduce((a,b)=>a+b,0)/pv.length)-1)*100;
        }
      }
      return wowVal;
    }
    function wowStr(wow) {
      if (wow==null) return '<span style="font-size:9px;color:var(--t3)">WoW —</span>';
      const s=wow>0?'+':''; const arr=wow>0?'🔺':'🔻';
      return `<span style="font-size:9px;font-weight:600;color:#0f172a">${arr}${s}${wow.toFixed(1)}%</span><span style="font-size:9px;color:var(--t3)"> WoW</span>`;
    }
    // 현재값: 이번주(마지막 7일) 평균 사용 (일별 마지막 하루 아님)
    // 현재값: CPI/CPA는 주간 합산 기준
    let topCurr, lowCurr;
    if (m.key === 'cpi') {
      const tSlice = dailyArr.slice(-7);
      const topC = tSlice.reduce((a,d)=>a+(d.top?.cost||0),0);
      const topI = tSlice.reduce((a,d)=>a+(d.top?.install||0),0);
      const lowC = tSlice.reduce((a,d)=>a+(d.low?.cost||0),0);
      const lowI = tSlice.reduce((a,d)=>a+(d.low?.install||0),0);
      topCurr = topI > 0 ? Math.round(topC/topI) : topD.filter(v=>v!=null).pop();
      lowCurr = lowI > 0 ? Math.round(lowC/lowI) : lowD.filter(v=>v!=null).pop();
    } else if (m.key === 'cpa') {
      const tSlice = dailyArr.slice(-7);
      const topC = tSlice.reduce((a,d)=>a+(d.top?.cost||0),0);
      const topCt = tSlice.reduce((a,d)=>a+(d.top?.contact||0),0);
      const lowC = tSlice.reduce((a,d)=>a+(d.low?.cost||0),0);
      const lowCt = tSlice.reduce((a,d)=>a+(d.low?.contact||0),0);
      topCurr = topCt > 0 ? Math.round(topC/topCt) : topD.filter(v=>v!=null).pop();
      lowCurr = lowCt > 0 ? Math.round(lowC/lowCt) : lowD.filter(v=>v!=null).pop();
    } else {
      const tSlice = dailyArr.slice(-7);
      const tVals = tSlice.map((_,i)=>topD[dailyArr.length-7+i]).filter(v=>v!=null);
      const lVals = tSlice.map((_,i)=>lowD[dailyArr.length-7+i]).filter(v=>v!=null);
      topCurr = tVals.length ? tVals.reduce((a,b)=>a+b,0)/tVals.length : topD.filter(v=>v!=null).pop();
      lowCurr = lVals.length ? lVals.reduce((a,b)=>a+b,0)/lVals.length : lowD.filter(v=>v!=null).pop();
    }
    html+=`<div class="toplow-card">
      <div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">${m.label}</div>
      <div style="display:flex;gap:14px;margin-bottom:6px">
        <div><div style="font-size:9px;color:#e84545">TOP</div><div style="font-size:14px;font-weight:800;color:var(--t1)">${fmtV(topCurr,m.unit)}</div><div>${wowStr(wowAvg(topD, m.key))}</div></div>
        <div><div style="font-size:9px;color:#ff8c42">LOW</div><div style="font-size:14px;font-weight:800;color:var(--t1)">${fmtV(lowCurr,m.unit)}</div><div>${wowStr(wowAvg(lowD, m.key))}</div></div>
      </div>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible">
        ${buildLine(topD,'#e84545')}
        ${buildLine(lowD,'#ff8c42')}
        ${xLabels}
      </svg>
      <div class="tl-legend">
        <div class="tl-leg-item"><div class="tl-dot" style="background:#e84545"></div>TOP</div>
        <div class="tl-leg-item"><div class="tl-dot" style="background:#ff8c42"></div>LOW</div>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}


function getWeekDaily(dailyMap, ws, we) {
  return Object.entries(dailyMap)
    .filter(([d]) => d >= ws && d <= we)
    .sort(([a],[b]) => a < b ? -1 : 1)
    .map(([d, v]) => ({
      label: fmtMMDD(d), date: d,
      cpm: v.cpm, ctr: v.ctr, cpi: v.cpi, cpa: v.cpa,
      cost: v.cost, imps: v.imps, clicks: v.clicks, install: v.install, contact: v.contact
    }));
}

function getTopLowDaily(ws, we) {
  const topDays = getWeekDaily(DAILY.top, ws, we);
  const lowDays = getWeekDaily(DAILY.low, ws, we);
  const allDates = [...new Set([...topDays.map(d=>d.date),...lowDays.map(d=>d.date)])].sort();
  return allDates.map(d => ({
    date: fmtMMDD(d), date_full: d,
    top: topDays.find(x=>x.date===d) || {},
    low: lowDays.find(x=>x.date===d) || {},
  }));
}

function renderOverview(w, isJuneOrLater) {

    avg4.contact += (pw.gt?.contact||0)+(pw.gi?.contact||0)+(pw.fbi?.contact||0)+pwFbcCont;

  }
  const a4i = avg4.cnt > 0 ? avg4.install/avg4.cnt : null;
  const a4c = avg4.cnt > 0 ? avg4.contact/avg4.cnt : null;
  const a4s = avg4.cnt > 0 ? avg4.cost/avg4.cnt : null;
  
  // 6월 이후: FBC(FB_CPA) 포함 합산
  const fbcDaily4wow = isJuneOrLater ? getWeekDaily(DAILY.fbc, w.week_start, w.week_end) : [];
  let fbcCost4wow=0, fbcInst4wow=0, fbcCont4wow=0;
  fbcDaily4wow.forEach(d=>{fbcCost4wow+=d.cost; fbcInst4wow+=d.install; fbcCont4wow+=d.contact;});

  const curInst  = (w.gt?.install||0)+(w.gi?.install||0)+(w.fbi?.install||0)+fbcInst4wow;
  const curCont  = (w.gt?.contact||0)+(w.gi?.contact||0)+(w.fbi?.contact||0)+fbcCont4wow;
  const curCost  = (w.gt?.cost||0)+(w.gi?.cost||0)+(w.fbi?.cost||0)+fbcCost4wow;
  const curCPI   = curInst>0 ? Math.round(curCost/curInst) : null;
  const curCPA   = curCont>0 ? Math.round(curCost/curCont) : null;

  // 전주도 동일하게 FBC 포함
  const prevFbcDaily4wow = (isJuneOrLater && prev) ? getWeekDaily(DAILY.fbc, prev.week_start, prev.week_end) : [];
  let prevFbcCost4wow=0, prevFbcInst4wow=0, prevFbcCont4wow=0;
  prevFbcDaily4wow.forEach(d=>{prevFbcCost4wow+=d.cost; prevFbcInst4wow+=d.install; prevFbcCont4wow+=d.contact;});

  const prevInst = prev ? (prev.gt?.install||0)+(prev.gi?.install||0)+(prev.fbi?.install||0)+prevFbcInst4wow : null;
  const prevCont = prev ? (prev.gt?.contact||0)+(prev.gi?.contact||0)+(prev.fbi?.contact||0)+prevFbcCont4wow : null;
  const prevCost = prev ? (prev.gt?.cost||0)+(prev.gi?.cost||0)+(prev.fbi?.cost||0)+prevFbcCost4wow : null;
  const prevCPI  = prevInst>0 ? Math.round(prevCost/prevInst) : null;
  const prevCPA  = prevCont>0 ? Math.round(prevCost/prevCont) : null;
  const a4CPI    = a4i>0 ? Math.round(a4s/a4i) : null;
  const a4CPA    = a4c>0 ? Math.round(a4s/a4c) : null;

  function wowHtml(curr, prev, label) {
    if (!curr||!prev||prev===0) return '';
    const d=(curr/prev-1)*100;
    const arr=d>0?'🔺':'🔻';
    return `<div class="wow-dr"><span class="wow-dl">${label}</span><span class="wow-dv">${arr}${d>0?'+':''}${d.toFixed(1)}%</span></div>`;
  }

  const a4cost = avg4.cnt > 0 ? avg4.cost/avg4.cnt : null;
  const prevCost2 = prev ? (prev.gt?.cost||0)+(prev.gi?.cost||0)+(prev.fbi?.cost||0)+prevFbcCost4wow : null;

  const wowCards = [
    { lbl:'Total Cost', val:curCost?Math.round(curCost).toLocaleString('ko')+'원':'—',
      d1:prev?`vs 전주 ${prevCost2?Math.round(prevCost2).toLocaleString('ko')+'원':'—'}`:'', v1:wowHtml(curCost,prevCost2,''),
      d2:a4cost?`vs 4주주평균 ${Math.round(a4cost).toLocaleString('ko')}원`:'', v2:wowHtml(curCost,a4cost,'') },
    { lbl:'Total Install', val:N(curInst)+'건',
      d1:prev?`vs 전주 ${N(prevInst)}건`:'', v1:wowHtml(curInst,prevInst,''),
      d2:a4i?`vs 4주주평균 ${Math.round(a4i).toLocaleString('ko')}건`:'', v2:wowHtml(curInst,a4i,'') },
    { lbl:'CONTACT', val:N(curCont)+'건',
      d1:prev?`vs 전주 ${N(prevCont)}건`:'', v1:wowHtml(curCont,prevCont,''),
      d2:a4c?`vs 4주주평균 ${Math.round(a4c).toLocaleString('ko')}건`:'', v2:wowHtml(curCont,a4c,'') },
    { lbl:'CPI (전 매체 합산)', val:curCPI?N(curCPI)+'원':'—',
      d1:prev?`vs 전주 ${prevCPI?N(prevCPI)+'원':'—'}`:'', v1:wowHtml(curCPI,prevCPI,''),
      d2:a4CPI?`vs 4주평균 ${N(a4CPI)}원`:'', v2:wowHtml(curCPI,a4CPI,'') },
    { lbl:'CPA (전 매체 합산)', val:curCPA?N(curCPA)+'원':'—',
      d1:prev?`vs 전주 ${prevCPA?N(prevCPA)+'원':'—'}`:'', v1:wowHtml(curCPA,prevCPA,''),
      d2:a4CPA?`vs 4주평균 ${N(a4CPA)}원`:'', v2:wowHtml(curCPA,a4CPA,'') },
  ];

  // 캠페인 테이블
  // 6월 이후: 6/1부터 선택 주차 마지막날까지 전체 daily
  // FBC: 선택 주차 주간값 (캠페인 테이블용 - GT/GI/FBI와 동일 기준)

  // TOP/LOW: 선택주차 한 주간 (캠페인 테이블용)
  const topDaily = isJuneOrLater ? getWeekDaily(DAILY.top, w.week_start, w.week_end) : [];
  const lowDaily = isJuneOrLater ? getWeekDaily(DAILY.low, w.week_start, w.week_end) : [];
  let fbcCost=0,fbcInst=0,fbcCont=0,fbcImps=0,fbcClks=0;
  fbcDaily.forEach(d=>{fbcCost+=d.cost;fbcInst+=d.install;fbcCont+=d.contact;fbcImps+=(d.imps||0);fbcClks+=(d.clicks||0);});
  const fbcCPM = fbcImps>0 ? Math.round(fbcCost/fbcImps*1000) : null;
  const fbcCTR = fbcImps>0 ? parseFloat((fbcClks/fbcImps*100).toFixed(2)) : null;
  let topCost=0,topInst=0,topCont=0,topImps=0,topClks=0; topDaily.forEach(d=>{topCost+=d.cost;topInst+=d.install;topCont+=d.contact;topImps+=(d.imps||0);topClks+=(d.clicks||0);});
  let lowCost=0,lowInst=0,lowCont=0,lowImps=0,lowClks=0; lowDaily.forEach(d=>{lowCost+=d.cost;lowInst+=d.install;lowCont+=d.contact;lowImps+=(d.imps||0);lowClks+=(d.clicks||0);});
  const fbcCPI=fbcInst>0?Math.round(fbcCost/fbcInst):null, fbcCPA=fbcCont>0?Math.round(fbcCost/fbcCont):null;
  const topCPI=topInst>0?Math.round(topCost/topInst):null, topCPA=topCont>0?Math.round(topCost/topCont):null;
  const lowCPI=lowInst>0?Math.round(lowCost/lowInst):null, lowCPA=lowCont>0?Math.round(lowCost/lowCont):null;
  const topCPM=topImps>0?Math.round(topCost/topImps*1000):null, topCTR=topImps>0?parseFloat((topClks/topImps*100).toFixed(2)):null;
  const lowCPM=lowImps>0?Math.round(lowCost/lowImps*1000):null, lowCTR=lowImps>0?parseFloat((lowClks/lowImps*100).toFixed(2)):null;

  // 6월 이전: GI, GT(전체), FBI만
  let campRows = [];
  if (isJuneOrLater) {
    // 전주 TOP/LOW daily 합산
    const prevTopDaily = curIdx>0 ? getWeekDaily(DAILY.top, WEEKS[curIdx-1].week_start, WEEKS[curIdx-1].week_end) : [];

    const prevTopCPI = ptInst>0?Math.round(ptCost/ptInst):null;
    const prevTopCPA = ptCont>0?Math.round(ptCost/ptCont):null;
    const prevLowCPI = plInst>0?Math.round(plCost/plInst):null;
    const prevLowCPA = plCont>0?Math.round(plCost/plCont):null;
    const prevFbcCPI = pfcInst>0?Math.round(pfcCost/pfcInst):null;
    const prevFbcCPA = pfcCont>0?Math.round(pfcCost/pfcCont):null;

    campRows = [
      {nm:'G.tROAS_TOP',tag:'신규',type:'GT',cost:topCost,inst:topInst,cont:topCont,cpi:topCPI,cpa:topCPA,cpm:topCPM,ctr:topCTR,prevCpi:prevTopCPI,prevCpa:prevTopCPA,badge:'ob-wn',label:'⚠ 모니터링'},
      {nm:'G.tROAS_LOW',tag:'신규',type:'GT',cost:lowCost,inst:lowInst,cont:lowCont,cpi:lowCPI,cpa:lowCPA,cpm:lowCPM,ctr:lowCTR,prevCpi:prevLowCPI,prevCpa:prevLowCPA,badge:'ob-wn',label:'⚠ 모니터링'},
      {nm:'G.UAC (GI)',tag:null,type:'GI',cost:w.gi?.cost,inst:w.gi?.install,cont:w.gi?.contact,cpi:w.gi?.cpi,cpa:w.gi?.cpa,cpm:w.gi?.cpm,ctr:w.gi?.ctr,prevCpi:prevGI?.cpi,prevCpa:prevGI?.cpa,badge:'ob-ok',label:'✓ 정상'},
      {nm:'FB_Install',tag:'재라이브',type:'META',cost:w.fbi?.cost,inst:w.fbi?.install,cont:w.fbi?.contact,cpi:w.fbi?.cpi,cpa:w.fbi?.cpa,cpm:w.fbi?.cpm,ctr:w.fbi?.ctr,prevCpi:prevFBI?.cpi,prevCpa:prevFBI?.cpa,badge:'ob-bd',label:'🔴 주의'},
      {nm:'FB_CPA',tag:'신규',type:'META',cost:fbcCost,inst:fbcInst,cont:fbcCont,cpi:fbcCPI,cpa:fbcCPA,cpm:fbcCPM,ctr:fbcCTR,prevCpi:prevFbcCPI,prevCpa:prevFbcCPA,badge:'ob-bd',label:'🔴 주의'},
    ];
  } else {
    campRows = [
      {nm:'G.tROAS(전체)',tag:null,type:'GT',cost:w.gt?.cost,inst:w.gt?.install,cont:w.gt?.contact,cpi:w.gt?.cpi,cpa:w.gt?.cpa,cpm:w.gt?.cpm,ctr:w.gt?.ctr,prevCpi:prevGT?.cpi,prevCpa:prevGT?.cpa,badge:'ob-ok',label:''},
      {nm:'G.UAC (GI)',tag:null,type:'GI',cost:w.gi?.cost,inst:w.gi?.install,cont:w.gi?.contact,cpi:w.gi?.cpi,cpa:w.gi?.cpa,cpm:w.gi?.cpm,ctr:w.gi?.ctr,prevCpi:prevGI?.cpi,prevCpa:prevGI?.cpa,badge:'ob-ok',label:''},
      {nm:'FB_Install',tag:null,type:'META',cost:w.fbi?.cost,inst:w.fbi?.install,cont:w.fbi?.contact,cpi:w.fbi?.cpi,cpa:w.fbi?.cpa,cpm:w.fbi?.cpm,ctr:w.fbi?.ctr,prevCpi:prevFBI?.cpi,prevCpa:prevFBI?.cpa,badge:'ob-ok',label:''},
    ];
  }

  // CPI/CPA: 전주 대비 상승=빨강, 하락=파랑, 전주없으면 기본
  function cpiColorCls(curr, prevVal) {
    if (!curr) return 'td-r';
    if (!prevVal) return 'td-r';
    return curr > prevVal ? 'td-bd' : 'td-ok';
  }

  // innerHTML 조각 조합
  let _html = '';

  if (isJuneOrLater) {
    const KPI_BUDGET = { gt_top:10200000, gt_low:10200000, gi:4891410, meta_i:5296752, meta_c:9600000, total:41588172 };
    const KPI_INSTALL = 13432;
    // 매체별 Install KPI (수연 제공: GI_AOS 2,854 / GT_TOP 2,910 / GT_LOW 2,910 / Meta_CPI 2,047 / Meta_CPA 2,490 / NB 221)
    const KPI_INSTALL_MEDIA = { gt_top:2910, gt_low:2910, gi:2854, meta_i:2047, meta_c:2490 };
    const JUNE_DAYS = 30;
    const june1 = new Date('2026-06-01');
    const weekEndDate = new Date(w.week_end);
    const elapsedDays = Math.round((weekEndDate - june1) / 86400000) + 1;
    const periodPct = Math.round(elapsedDays / JUNE_DAYS * 1000) / 10;

    let cumTop=0,cumLow=0,cumGi=0,cumFbi=0,cumFbc=0,cumInstTop=0,cumInstLow=0,cumInstGi=0,cumInstFbi=0,cumInstFbc=0;
    Object.entries(DAILY.top).forEach(([d,v]) => { if(d>='2026-06-01'&&d<=w.week_end){ cumTop+=v.cost; cumInstTop+=v.install; }});
    Object.entries(DAILY.low).forEach(([d,v]) => { if(d>='2026-06-01'&&d<=w.week_end){ cumLow+=v.cost; cumInstLow+=v.install; }});
    Object.entries(DAILY.gi).forEach(([d,v])  => { if(d>='2026-06-01'&&d<=w.week_end){ cumGi+=v.cost; cumInstGi+=v.install; }});
    Object.entries(DAILY.fbi).forEach(([d,v]) => { if(d>='2026-06-01'&&d<=w.week_end){ cumFbi+=v.cost; cumInstFbi+=v.install; }});

      const d = (r.curr/r.prev-1)*100;
      const lbl = wowCards[i].d1 || '';
      html += `<div class="wow-dr"><span class="wow-dl">${lbl}</span><span class="wow-dv">${d>0?'🔺':'🔻'}${d>0?'+':''}${d.toFixed(1)}%</span></div>`;
    }
    if (r.a4 && r.curr && r.a4 > 0) {
      const d = (r.curr/r.a4-1)*100;
      const lbl = wowCards[i].d2 || '';
      html += `<div class="wow-dr"><span class="wow-dl">${lbl}</span><span class="wow-dv">${d>0?'🔺':'🔻'}${d>0?'+':''}${d.toFixed(1)}%</span></div>`;
    }
    el.innerHTML = html;
  });
}

/* ══════════════════════════════════════════
   RENDER INSIGHT
══════════════════════════════════════════ */
function renderInsight(weekKey) {
  const hier = HIER_DATA[weekKey];
  if (!hier) { document.getElementById('insight-panel').innerHTML='<div class="no-data-msg">이 주차의 소재 데이터가 없습니다</div>'; return; }
  const conv = hier['chut_app_conversion (aos)'] || {};
  const inst = hier['chut_app_install (aos)'] || {};

  // 세트명이 주차마다 바뀔 수 있어(예: 매물형 OFF, 브랜딩형A/B/C 분리 등) 하드코딩된 이름 대신
  // 해당 주차에 실제 존재하는 세트 중 비용이 발생한 세트를 CPA/CPI 기준으로 정렬해 동적으로 선택
  function rankSets(group, metricKey) {
    return Object.entries(group)
      .filter(([k, v]) => v && v.cost > 0)
      .sort((a, b) => {
        const av = a[1][metricKey], bv = b[1][metricKey];
        if (av == null) return 1;
        if (bv == null) return -1;
        return av - bv;
      });
  }

  const convRanked = rankSets(conv, 'cpa');
  const instRanked = rankSets(inst, 'cpi');

  const rows = [];
  if (convRanked.length) {
    const [bestName, bestData] = convRanked[0];
    rows.push({ lbl:'FB_CPA · '+bestName, sub:'chut_app_conversion · CPA 기준', data:bestData, action:'↑ 예산 확대', acls:'a-up', hi:false });
  }
  if (convRanked.length > 1) {
    const [worstName, worstData] = convRanked[convRanked.length-1];
    rows.push({ lbl:'FB_CPA · '+worstName, sub:'chut_app_conversion', data:worstData, action:'↓ 예산 축소', acls:'a-cut', hi:false });
  }
  if (instRanked.length) {
    const [bestName, bestData] = instRanked[0];
    rows.push({ lbl:'FB_Install · '+bestName, sub:'chut_app_install · CPI+CTR 기준', data:bestData, action:'↑ 예산 확대', acls:'a-up', hi:true });
  }
  if (instRanked.length > 1) {
    const [worstName, worstData] = instRanked[instRanked.length-1];
    rows.push({ lbl:'FB_Install · '+worstName, sub:'chut_app_install', data:worstData, action:'↓ 예산 축소', acls:'a-cut', hi:false });
  }

  const el = document.getElementById('insight-panel'); if(!el) return;
  el.innerHTML = `<div class="ip-hd">📊 광고세트 효율 비교 — 액션 우선순위 (${weekKey.slice(5)} 주차 누계)</div>
  ${rows.map(r=>`<div class="ip-row"${r.hi?' style="background:rgba(0,171,255,.04)"':''}>
    <div><div class="ip-lbl">${r.lbl}</div><div class="ip-sub">${r.sub}</div></div>
    <div>
      <div class="ip-metrics">
        <span class="ip-m">Cost <strong>${N(r.data.cost)}</strong></span>
        <span class="ip-m">Install <strong>${N(r.data.install)}건</strong></span>
        <span class="ip-m">CPI <strong style="color:${r.data.cpi&&r.data.cpi<3500?'#00ABFF':'#ff4668'}">${N(r.data.cpi)}원</strong></span>
        <span class="ip-m">Contact <strong>${N(r.data.contact)}건</strong></span>
        <span class="ip-m">CPA <strong style="color:${!r.data.cpa||r.data.cpa<200000?'#00ABFF':'#ff4668'}">${N(r.data.cpa)}원</strong></span>
        <span class="ip-m">CPM <strong>${N(r.data.cpm)}원</strong></span>
        <span class="ip-m">CTR <strong>${r.data.ctr?r.data.ctr.toFixed(1)+'%':'—'}</strong></span>
      </div>
    </div>
    <div><span class="action-btn ${r.acls}">${r.action}</span></div>
  </div>`).join('')}`;
}

/* ══════════════════════════════════════════
   RENDER HIER
══════════════════════════════════════════ */
function renderHier(weekKey) {
  const hier = HIER_DATA[weekKey];
  const el = document.getElementById('hier-body'); if(!el) return;
  if (!hier) { el.innerHTML='<tr><td colspan="9" class="no-data-msg">이 주차의 소재 데이터가 없습니다</td></tr>'; return; }
  
  const FB = f => ({keep:'<span class="fk">🟢 유지</span>',watch:'<span class="fw">🟡 관망</span>',replace:'<span class="fr">🔴 교체</span>'}[f]||'—');
  let h='';
  Object.entries(hier).forEach(([camp,adsets],ci)=>{
    if (Object.values(adsets).every(a=>!a.cost)) return;
    const cid='c'+ci;
    let cc=0,ci2=0,cct=0;
    Object.values(adsets).forEach(a=>{cc+=a.cost;ci2+=a.install;cct+=a.contact;});
    const cCPI=ci2>0?Math.round(cc/ci2):null, cCPA=cct>0?Math.round(cc/cct):null;
    h+=`<tr class="cr expanded" onclick="tg('${cid}',this)"><td><span class="ex">▶</span>${camp}</td><td class="r">${N(cc)}</td><td class="r">${N(ci2)}</td><td class="r">${N(cCPI,'원')}</td><td class="r">${N(cct)}</td><td class="r">${N(cCPA,'원')}</td><td class="r">—</td><td class="r">—</td><td></td></tr>`;
    Object.entries(adsets).forEach(([adset,a],ai)=>{
      if (!a.cost) return;
      const aid=cid+'a'+ai;
      h+=`<tr class="ar expanded" data-p="${cid}" onclick="tg('${aid}',this)"><td><span class="ex">▶</span>${adset}</td><td class="r">${N(a.cost)}</td><td class="r">${N(a.install)}</td><td class="r">${N(a.cpi,'원')}</td><td class="r">${N(a.contact)}</td><td class="r">${N(a.cpa,'원')}</td><td class="r">${N(a.cpm,'원')}</td><td class="r">${a.ctr?a.ctr.toFixed(2)+'%':'—'}</td><td></td></tr>`;
      (a.ads||[]).forEach(ad=>{
        h+=`<tr class="dr" data-p="${aid}"><td>${ad.name}</td><td class="r">${N(ad.cost)}</td><td class="r">${N(ad.install)}</td><td class="r">${N(ad.cpi,'원')}</td><td class="r">${N(ad.contact)}</td><td class="r">${N(ad.cpa,'원')}</td><td class="r">${N(ad.cpm,'원')}</td><td class="r">${ad.ctr?ad.ctr.toFixed(2)+'%':'—'}</td><td>${FB(ad.flag)}</td></tr>`;
      });
    });
  });
  el.innerHTML = h;
}

function tg(id,el) {
  const rows=document.querySelectorAll(`[data-p="${id}"]`);
  const exp=el.classList.contains('expanded');
  rows.forEach(r=>{
    r.style.display=exp?'none':'';
    if(exp){const m=(r.getAttribute('onclick')||'').match(/'([^']+)'/);if(m){document.querySelectorAll(`[data-p="${m[1]}"]`).forEach(cr=>cr.style.display='none');const ct=document.querySelector(`[onclick="tg('${m[1]}',this)"]`);if(ct)ct.classList.remove('expanded');}}
  });
  el.classList.toggle('expanded',!exp);
}

/* ══════════════════════════════════════════
   NAV
══════════════════════════════════════════ */
function nav(v,el) {
  document.querySelectorAll('.view-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sb-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  el.classList.add('active');
  const t={overview:'Overview',google:'Google Ads',meta:'META'};
  document.getElementById('ph-title').textContent=t[v]||'';
  if (!dataLoaded) return;
  const w=WEEKS[curIdx]; const isJ=w.week_start>='2026-06-01';
  if (v==='google') renderGoogle(w,isJ);
  if (v==='meta')   renderMeta(w,isJ);
}

/* ══════════════════════════════════════════
   TOOLTIP
══════════════════════════════════════════ */
document.addEventListener('mousemove', function(e) {
  const pt = e.target.closest?.('.hover-pt');
  const tip = document.getElementById('chart-tooltip');
  if (!tip) return;
  if (pt) {
    const v=pt.getAttribute('data-val'), lbl=pt.getAttribute('data-lbl'), delta=pt.getAttribute('data-delta');
    const isPos=delta?.startsWith('+'), isNeg=delta?.startsWith('-');
    const arr=isPos?'🔺':(isNeg?'🔻':'');
    const dNum=delta&&delta!=='—'?delta.replace(/[+-]/,''):delta;
    tip.style.display='block';
    tip.innerHTML=`<span style="color:#7a8fa6;font-size:9px">${lbl}</span>&nbsp;&nbsp;<strong style="font-size:11px">${v}</strong>&nbsp;&nbsp;<span style="font-size:10px;color:#0f172a">${arr}${dNum!=='—'?dNum:'—'}</span>`;
    const tw=tip.offsetWidth, th=tip.offsetHeight;
    let left=e.clientX-tw/2, top=e.clientY-th-12;
    if(left<8)left=8;
    if(left+tw>window.innerWidth-8)left=window.innerWidth-tw-8;
    if(top<8)top=e.clientY+16;
    tip.style.left=left+'px'; tip.style.top=top+'px';
  } else {
    tip.style.display='none';
  }
});
